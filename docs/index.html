<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenDesk Documentation</title>
  <meta name="description" content="Documentation GreenDesk - API, architecture, usage, qualité et opérations." />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="./custom.css" />
</head>

<body>
  <div class="top-actions" aria-label="Actions documentation">
    <button id="exportPdfBtn" class="action-btn action-btn-primary" title="Exporter la documentation en PDF">
      Exporter en PDF
    </button>
    <button id="scrollTopBtn" class="action-btn" title="Revenir en haut">
      Haut de page
    </button>
  </div>

  <div id="app">Chargement de la documentation...</div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { useMaxWidth: true, htmlLabels: true }
    });

    const decodeBase64Utf8 = (base64) => {
      const binary = atob(base64);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder('utf-8').decode(bytes);
    };

    const docsifyUiPlugin = (hook) => {
      hook.doneEach(() => {
        const pendingDiagrams = document.querySelectorAll('.mermaid:not([data-processed="true"])');
        if (pendingDiagrams.length > 0) {
          pendingDiagrams.forEach((node) => {
            try {
              const encoded = node.getAttribute('data-mermaid') || '';
              if (encoded) {
                const source = decodeBase64Utf8(encoded);
                const renderId = `mmd_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
                mermaid.render(renderId, source).then(({ svg }) => {
                  node.innerHTML = svg;
                  node.setAttribute('data-processed', 'true');
                }).catch((error) => {
                  console.error('Mermaid render error:', error);
                  node.textContent = source;
                });
              }
            } catch (error) {
              console.error('Mermaid render error:', error);
            }
          });
        }

        const summaryLinks = document.querySelectorAll('.markdown-section a[href^="#"]');
        summaryLinks.forEach((link) => {
          if (link.dataset.anchorBound) return;

          const href = link.getAttribute('href') || '';
          if (!href || href.startsWith('#/') || href.startsWith('#?')) return;

          link.dataset.anchorBound = 'true';
          link.addEventListener('click', (event) => {
            const rawId = href.slice(1);
            if (!rawId) return;

            const targetId = decodeURIComponent(rawId);
            const target = document.getElementById(targetId);
            if (!target) return;

            event.preventDefault();
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            if (history && history.replaceState) {
              history.replaceState(null, '', `${location.pathname}${location.search}${location.hash}`);
            }
          });
        });

        const exportBtn = document.getElementById('exportPdfBtn');
        const topBtn = document.getElementById('scrollTopBtn');

        if (exportBtn && !exportBtn.dataset.bound) {
          exportBtn.dataset.bound = 'true';
          exportBtn.addEventListener('click', () => window.print());
        }

        if (topBtn && !topBtn.dataset.bound) {
          topBtn.dataset.bound = 'true';
          topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
      });
    };

    window.$docsify = {
      name: '',
      repo: '',
      homepage: 'index.md',
      loadSidebar: false,
      loadNavbar: false,
      subMaxLevel: 0,
      maxLevel: 0,
      auto2top: true,
      relativePath: true,
      coverpage: false,
      mergeNavbar: false,
      topMargin: 70,
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              const encoded = btoa(unescape(encodeURIComponent(String(code))));
              return `<div class="mermaid" data-mermaid="${encoded}"></div>`;
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      pagination: {
        previousText: 'Précédent',
        nextText: 'Suivant',
        crossChapter: true,
        crossChapterText: true,
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Rechercher dans la documentation',
        noData: 'Aucun résultat',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copier',
        errorText: 'Erreur',
        successText: 'Copié'
      },
      plugins: [docsifyUiPlugin]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>

</html>

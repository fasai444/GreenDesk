<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenDesk Documentation</title>
  <meta name="description" content="Documentation GreenDesk - API, architecture, usage, qualité et opérations." />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="./custom.css" />
</head>

<body>
  <div class="top-actions" aria-label="Actions documentation">
    <button id="exportPdfBtn" class="action-btn action-btn-primary" title="Exporter la documentation en PDF">
      Exporter en PDF
    </button>
    <button id="scrollTopBtn" class="action-btn" title="Revenir en haut">
      Haut de page
    </button>
  </div>

  <div id="app">Chargement de la documentation...</div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ 
      startOnLoad: false, 
      theme: 'default', 
      securityLevel: 'loose',
      flowchart: { useMaxWidth: true, htmlLabels: true }
    });

    const docsifyUiPlugin = (hook) => {
      hook.afterEach((html, next) => {
        // Transform mermaid code blocks to divs before rendering
        html = html.replace(/<pre[^>]*data-lang="mermaid"[^>]*><code[^>]*>([\s\S]*?)<\/code><\/pre>/g, 
          (match, code) => {
            const decodedCode = code
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&#39;/g, "'");
            return '<div class="mermaid">' + decodedCode + '</div>';
          });
        next(html);
      });
      
      hook.doneEach(() => {
        // Render all mermaid diagrams
        const mermaidElements = document.querySelectorAll('.mermaid');
        if (mermaidElements.length > 0) {
          mermaid.run({ nodes: mermaidElements });
        }

        const summaryLinks = document.querySelectorAll('.markdown-section a[href^="#"]');
        summaryLinks.forEach((link) => {
          if (link.dataset.anchorBound) {
            return;
          }

          const href = link.getAttribute('href') || '';
          if (!href || href.startsWith('#/') || href.startsWith('#?')) {
            return;
          }

          link.dataset.anchorBound = 'true';
          link.addEventListener('click', (event) => {
            const rawId = href.slice(1);
            if (!rawId) {
              return;
            }

            const targetId = decodeURIComponent(rawId);
            const target = document.getElementById(targetId);
            if (!target) {
              return;
            }

            event.preventDefault();
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            if (history && history.replaceState) {
              history.replaceState(null, '', `${location.pathname}${location.search}${location.hash}`);
            }
          });
        });

        const exportBtn = document.getElementById('exportPdfBtn');
        const topBtn = document.getElementById('scrollTopBtn');

        if (exportBtn && !exportBtn.dataset.bound) {
          exportBtn.dataset.bound = 'true';
          exportBtn.addEventListener('click', () => {
            window.print();
          });
        }

        if (topBtn && !topBtn.dataset.bound) {
          topBtn.dataset.bound = 'true';
          topBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        }
      });
    };

    window.$docsify = {
      name: '',
      repo: '',
      homepage: 'index.md',
      loadSidebar: false,
      loadNavbar: false,
      subMaxLevel: 0,
      maxLevel: 0,
      auto2top: true,
      relativePath: true,
      coverpage: false,
      mergeNavbar: false,
      topMargin: 70,
      pagination: {
        previousText: 'Précédent',
        nextText: 'Suivant',
        crossChapter: true,
        crossChapterText: true,
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Rechercher dans la documentation',
        noData: 'Aucun résultat',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copier',
        errorText: 'Erreur',
        successText: 'Copié'
      },
      plugins: [docsifyUiPlugin]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>

</html>

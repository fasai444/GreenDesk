<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenDesk Documentation</title>
  <meta name="description" content="Documentation GreenDesk - API, architecture, usage, qualité et opérations." />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="./custom.css" />
</head>

<body>
  <div class="top-actions" aria-label="Actions documentation">
    <button id="exportPdfBtn" class="action-btn action-btn-primary" title="Exporter la documentation en PDF">
      Exporter en PDF
    </button>
    <button id="scrollTopBtn" class="action-btn" title="Revenir en haut">
      Haut de page
    </button>
  </div>

  <div id="app">Chargement de la documentation...</div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    function initMermaid() {
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'default',
        flowchart: { htmlLabels: true, curve: 'basis' }
      });
    }

    initMermaid();

    const docsifyMermaidPlugin = (hook) => {
      hook.doneEach(() => {
        const mermaidBlocks = document.querySelectorAll('pre[data-lang="mermaid"]');
        mermaidBlocks.forEach((block, index) => {
          const code = block.querySelector('code');
          if (!code) {
            return;
          }

          const graphDefinition = code.textContent || '';
          const container = document.createElement('div');
          container.className = 'mermaid';
          container.id = `mermaid-${Date.now()}-${index}`;
          container.textContent = graphDefinition;
          block.parentNode.replaceChild(container, block);
        });

        const mermaidElements = document.querySelectorAll('.mermaid');
        mermaidElements.forEach((element) => {
          element.removeAttribute('data-processed');
        });
        mermaid.run({ querySelector: '.mermaid' });
      });
    };

    const docsifyUiPlugin = (hook) => {
      hook.doneEach(() => {
        const exportBtn = document.getElementById('exportPdfBtn');
        const topBtn = document.getElementById('scrollTopBtn');

        if (exportBtn && !exportBtn.dataset.bound) {
          exportBtn.dataset.bound = 'true';
          exportBtn.addEventListener('click', () => {
            window.print();
          });
        }

        if (topBtn && !topBtn.dataset.bound) {
          topBtn.dataset.bound = 'true';
          topBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        }
      });
    };

    window.$docsify = {
      name: '',
      repo: '',
      homepage: 'index.md',
      loadSidebar: false,
      loadNavbar: false,
      subMaxLevel: 0,
      maxLevel: 0,
      auto2top: true,
      relativePath: true,
      coverpage: false,
      mergeNavbar: false,
      topMargin: 70,
      pagination: {
        previousText: 'Précédent',
        nextText: 'Suivant',
        crossChapter: true,
        crossChapterText: true,
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Rechercher dans la documentation',
        noData: 'Aucun résultat',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copier',
        errorText: 'Erreur',
        successText: 'Copié'
      },
      plugins: [docsifyMermaidPlugin, docsifyUiPlugin]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>

</html>

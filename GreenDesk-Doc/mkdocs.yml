site_name: GreenDesk Documentation
site_description: Documentation complète pour GreenDesk - Plateforme de gestion et simulation de plantes
site_author: GreenDesk Team
site_url: https://greendesk.example.com

theme:
  name: material
  logo: assets/images/mkdocs-logo.svg
  favicon: assets/favicon.ico
  language: fr
  palette:
    - scheme: default
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-7
        name: Mode clair
    - scheme: slate
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-4
        name: Mode sombre
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy

markdown_extensions:
  # Removed pymdownx.emoji to avoid generating SVG emoji images
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - assets/js/mermaid-bundle.js
  - assets/js/mermaid-init.js

nav:
  - Accueil: index.md
  - Guide de démarrage: getting-started.md
  - Installation: installation.md
  - Statut: status.md
  - Guide d'utilisation:
    - Concepts fondamentaux: usage/concepts.md
    - Gestion des espèces: usage/species.md
    - Gestion des plantes: usage/plants.md
    - Gestion des forêts: usage/forests.md
    - Systèmes d'effets: usage/effects.md
  - API:
    - Vue d'ensemble: api/overview.md
    - Endpoints: api/endpoints.md
    - Exemples: api/examples.md
  - Architecture: architecture.md
  - Tests: testing.md
  - Docker: docker.md
  - Contribution: contributing.md
  - FAQ: faq.md

plugins:
  - search:
      lang: fr

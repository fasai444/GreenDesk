# MongoDB
# Par defaut, l'application utilise une base locale pour fonctionner sans compte Atlas.
# Les variables d'environnement permettent de surcharger facilement en Docker ou en production.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/greendesk}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:greendesk}

# MongoDB Docker
# spring.data.mongodb.uri=mongodb://admin:adminpass@mongodb:27017/greendesk?authSource=admin
# spring.data.mongodb.database=greendesk

# Spring Boot
spring.jackson.serialization.indent_output=true
spring.jackson.time-zone=Europe/Paris
server.port=8080

# ==================== NOTIFICATIONS ====================
# Activer l'affichage des notifications dans la console
notifications.console.enabled=true

# Configuration email (optionnel)
notifications.email.enabled=false
notifications.email.to=admin@greendesk.local

# Configuration SMTP (à décommenter si on utilise l'email)

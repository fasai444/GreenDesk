# ==================== TOMORROW.IO (Feature 1 + Feature 2) ====================
# Clé API : https://www.tomorrow.io/
tomorrow.api.key=${TOMORROW_API_KEY:}
tomorrow.webhook.url=${TOMORROW_WEBHOOK_URL:http://localhost:8080/api/weather/webhook}
weather.webhook.secret=${WEATHER_WEBHOOK_SECRET:dev-secret-local}


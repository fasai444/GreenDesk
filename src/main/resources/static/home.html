<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GreenDesk - Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .choice-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            color: white;
            width: 300px;
        }
        .choice-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-10px);
            color: #00d2ff;
        }
        .icon { font-size: 4rem; }
        
    </style>
</head>
<body>

<div class="container text-center">
    <h1 class="mb-5 fw-bold text-uppercase tracking-widest">Que voulez-vous lancer ?</h1>
    
   <div class="d-flex justify-content-center gap-5">
    <a href="dashboard.html" class="choice-card">
        <div class="icon"><i class="fas fa-desktop"></i></div>
        <h3>Interface Utilisateur</h3>
        <p>Accéder au dashboard GreenDesk (Livrable 3)</p>
    </a>

    <a href="/swagger-ui/index.html" class="choice-card">
        <div class="icon"><i class="fas fa-code"></i></div>
        <h3>Documentation API</h3>
        <p>Tester les endpoints via Swagger UI</p>
    </a>
</div>
</div>

</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GreenDesk – Simulateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .forest-grid {
      display: grid;
      gap: 4px;
      margin: 1.5rem auto;
      width: fit-content;
    }
    .forest-cell {
      width: 54px;
      height: 54px;
      background: #e8f5e9;
      border: 1px solid #81c784;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .forest-cell:hover { transform: scale(1.08); }
    .forest-cell.occupied { background: #c8e6c9; font-size: 2rem; }
    .status-healthy    { border-color: #2e7d32; background: #a5d6a7; }
    .status-stressed   { border-color: #f9a825; background: #fff176; }
    .status-diseased   { border-color: #c62828; background: #ef9a9a; }
    .status-dormant    { border-color: #757575; background: #eeeeee; }
  </style>
</head>
<body class="bg-light">

<div class="container my-4">

  <!-- En-tête -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="text-success"><i class="fas fa-leaf me-2"></i> GreenDesk</h1>
    <div>
      <button id="btnAutoPlay" class="btn btn-outline-danger">
        <i class="fas fa-play"></i> Auto
      </button>
    </div>
  </div>

  <!-- Choix forêt + actions -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="input-group">
        <select id="forestSelect" class="form-select">
          <option value="" disabled selected>Chargement...</option>
        </select>
        <button id="btnDeleteForest" class="btn btn-outline-danger" title="Supprimer forêt">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
    <div class="col-md-6 text-end">
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createForestModal">
        <i class="fas fa-plus"></i> Nouvelle forêt
      </button>
    </div>
  </div>

  <!-- Panneau saison -->
  <div id="seasonPanel" class="d-none p-3 mb-4 border rounded">
    <strong>Saison actuelle : <span id="currentSeasonName">—</span></strong>
    <button id="btnAdvanceSeason" class="btn btn-sm btn-outline-primary ms-3">
      Avancer <i class="fas fa-forward"></i>
    </button>
  </div>

  <!-- Grille -->
  <h4 id="forestTitle" class="mb-3">Sélectionnez une forêt</h4>
  <div id="gridLegend" class="d-none small text-muted mb-2">
    <i class="fas fa-seedling text-success"></i> = plante • Cliquer = actions
  </div>
  <div id="gridContainer"></div>

</div>

<!-- Modal Créer forêt -->
<div class="modal fade" id="createForestModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nouvelle forêt</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nom</label>
          <input id="newForestName" class="form-control" placeholder="Mon potager" required>
        </div>
        <div class="row g-3">
          <div class="col">
            <label class="form-label">Largeur</label>
            <input id="newForestW" type="number" min="3" value="8" class="form-control">
          </div>
          <div class="col">
            <label class="form-label">Hauteur</label>
            <input id="newForestH" type="number" min="3" value="6" class="form-control">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button id="btnCreateForest" class="btn btn-success">Créer</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Planter -->
<div class="modal fade" id="plantSeedModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Planter <span class="text-success">🌱</span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Position : <strong>(<span id="targetX">?</span>, <span id="targetY">?</span>)</strong></p>
        
        <div class="mb-3">
          <label class="form-label">Nom de la plante</label>
          <input id="plantNameInput" class="form-control" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Espèce</label>
          <select id="speciesSelectModal" class="form-select" required></select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button id="btnPlantConfirm" class="btn btn-success">Planter</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Actions sur plante -->
<div class="modal fade" id="plantActionModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="plantActionTitle">Plante</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <dl class="row small">
          <dt class="col-sm-4">Espèce</dt><dd class="col-sm-8" id="pSpecies">—</dd>
          <dt class="col-sm-4">État</dt><dd class="col-sm-8" id="pState">—</dd>
          <dt class="col-sm-4">Stress</dt><dd class="col-sm-8" id="pStress">—</dd>
        </dl>

        <hr class="my-3">

        <label class="form-label">Appliquer un effet</label>
        <div class="input-group mb-3">
          <select id="effectSelector" class="form-select"></select>
          <button id="btnApplyEffect" class="btn btn-outline-success">Appliquer</button>
        </div>

        <h6>Effets actifs :</h6>
        <ul id="activeEffectsList" class="list-group list-group-flush mb-3"></ul>

        <button id="btnRemovePlant" class="btn btn-outline-danger btn-sm w-100">
          <i class="fas fa-cut"></i> Arracher la plante
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>

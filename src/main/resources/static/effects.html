<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GreenDesk - Effets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html"><i class="fas fa-leaf"></i> GreenDesk</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Overview</a></li>
                <li class="nav-item"><a class="nav-link" href="simulateur.html">🌲 Simulateur</a></li>
                <li class="nav-item"><a class="nav-link" href="species.html">🧬 Espèces</a></li>
                <li class="nav-item"><a class="nav-link active fw-bold" href="effects.html">✨ Effets</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>✨ Catalogue des Effets</h2>
            <p class="text-muted">Gérez les bonus (Engrais) et malus (Ombre, Insectes) applicables.</p>
        </div>
        <button class="btn btn-warning text-dark" data-bs-toggle="modal" data-bs-target="#createEffectModal">
            <i class="fas fa-magic"></i> Nouvel Effet
        </button>
    </div>

    <div class="row g-3" id="effectsList">
        </div>
</div>

<div class="modal fade" id="createEffectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title text-dark">Créer un effet</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label>Nom de l'effet</label>
                <input type="text" id="effName" class="form-control mb-2" placeholder="ex: Super Engrais">
                <label>Type</label>
                <select id="effType" class="form-select mb-2">
                    <option value="BENEFICIAL">Bénéfique (Bonus)</option>
                    <option value="HARMFUL">Nuisible (Malus)</option>
                    <option value="NEUTRAL">Neutre</option>
                </select>
                <label>Modificateur (%)</label>
                <input type="number" id="effMod" class="form-control" placeholder="ex: 20 pour +20%">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="createEffect()">Créer</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="effects.js"></script>
</body>
</html>

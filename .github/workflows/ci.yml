name: CI-CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build du projet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Build (sans tests)
        run: ./gradlew clean assemble --no-daemon

      - name: Publier artefacts build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/libs/*.jar
            build/distributions/**
          if-no-files-found: warn

  tests:
    name: Exécution des tests automatiques
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Lancer les tests
        run: ./gradlew test --no-daemon

      - name: Publier rapport de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            build/reports/tests/test/**
            build/test-results/test/**
          if-no-files-found: warn

      - name: Publier couverture JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/reports/jacoco/test/**
          if-no-files-found: warn

  docs:
    name: Génération de la documentation
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Générer la Javadoc
        run: ./gradlew javadoc --no-daemon

      - name: Installer Pandoc et LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-recommended

      - name: Convertir README.md en PDF
        run: |
          mkdir -p build/docs
          pandoc README.md \
            --from markdown \
            --pdf-engine=xelatex \
            -V geometry:margin=2.5cm \
            -o build/docs/documentation.pdf

      - name: Archiver la Javadoc
        run: |
          cd build/docs
          zip -r javadoc.zip javadoc

      - name: Publier documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            build/docs/javadoc.zip
            build/docs/documentation.pdf
          if-no-files-found: error

  release:
    name: Création d'une release
    runs-on: ubuntu-latest
    needs:
      - build
      - tests
      - docs
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Télécharger artefacts build
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist

      - name: Télécharger documentation
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: dist/docs

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release automatique générée par GitHub Actions.

            Version: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Contenu:
            - Artifacts de build (.jar)
            - Javadoc (zip)
            - Documentation PDF (README converti)
          files: |
            dist/**/*.jar
            dist/**/*.zip
            dist/docs/javadoc.zip
            dist/docs/documentation.pdf

name: Release & Documentation PDF

on:
  push:
    tags:
      - 'v1.0.1'
      - 'v1.0.2'
      - 'v1.0.3'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, doc, release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build artifacts
        run: ./gradlew clean assemble javadoc --no-daemon

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-recommended

      - name: Generate PDF documentation
        run: |
          mkdir -p build/docs
          pandoc README.md \
            --from markdown \
            --pdf-engine=xelatex \
            -V geometry:margin=2.5cm \
            -o build/docs/documentation.pdf

      - name: Archive Javadoc
        run: |
          cd build/docs
          zip -r javadoc.zip javadoc

      - name: Set release metadata from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [ "$TAG" = "v1.0.1" ]; then
            TITLE="Livraison 1 - ${TAG}"
            BODY=$'Release automatique de la Livraison 1.\n\nContenu:\n- Build du projet\n- Artefacts Java'
          elif [ "$TAG" = "v1.0.2" ]; then
            TITLE="Livraison 2 - ${TAG}"
            BODY=$'Release automatique de la Livraison 2.\n\nContenu:\n- Build du projet\n- Tests automatiques\n- Documentation PDF'
          else
            TITLE="Livraison 3 - ${TAG}"
            BODY=$'Release automatique de la Livraison 3.\n\nContenu:\n- Build du projet\n- Documentation complète\n- Assets publiés'
          fi

          {
            echo "title=$TITLE"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.title }}
          body: ${{ steps.meta.outputs.body }}
          files: |
            build/libs/*.jar
            build/distributions/*.zip
            build/docs/javadoc.zip
            build/docs/documentation.pdf
